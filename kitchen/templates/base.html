<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hesham's Kitchen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        h1 { font-size: 2rem; font-weight: bold; margin-bottom: 16px; }
        .search-bar { display: flex; gap: 6px; margin-bottom: 20px; }
        .search-bar input { padding: 5px 8px; border: 1px solid #999; font-size: 0.95rem; width: 180px; }
        .search-bar select { padding: 5px 8px; border: 1px solid #999; background: white; }
        .search-bar button { padding: 5px 14px; border: 1px solid #999; background: #f5f5f5; cursor: pointer; }
        .search-bar button:hover { background: #e0e0e0; }
        .card { background: white; padding: 16px 20px; margin-bottom: 10px; border-radius: 4px; }
        .card h2 { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; }
        .card p { font-size: 0.95rem; color: #333; margin-bottom: 4px; }
        .available { color: green; font-weight: bold; }
        .unavailable { color: red; font-weight: bold; }
        .no-results { background: white; padding: 20px; border-radius: 4px; color: #666; }
    </style>
</head>
<body>
    <h1>Hesham's Kitchen 🍴</h1>

    <form method="get" class="search-bar">
        <input type="text" name="q" value="{{ query }}" placeholder="Search...">
        <select name="category">
            <option value="">All Categories</option>
            {% for cat in categories %}
                <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search</button>
    </form>

    {% if items %}
        {% for item in items %}
        <div class="card">
            <h2>{{ item.name }}</h2>
            <p>Category: {{ item.category }}</p>
            <p>Price: {{ item.price }} EGP</p>
            {% if item.available %}
                <p class="available">Available ✅</p>
            {% else %}
                <p class="unavailable">Not Available ❌</p>
            {% endif %}
        </div>
        {% endfor %}
    {% else %}
        <div class="no-results">No items found.</div>
    {% endif %}
</body>
</html>
